name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --passWithNoTests --watchAll=false
